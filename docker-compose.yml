version: "3.9"

# ─── CryptoTrader Pro — Full Stack ────────────────────────────────────────────
# Usage:
#   cp .env.example .env      # fill in your values
#   docker compose up -d      # start all services
#   docker compose logs -f    # watch logs

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-cryptotrader}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trader:trader_secret@db:5432/cryptotrader
      REDIS_URL:    redis://redis:6379/0
      USE_REDIS:    "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Streamlit dashboard ───────────────────────────────────────────────────
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: streamlit run panel.py --server.port=8501 --server.address=0.0.0.0
             --server.headless=true --browser.gatherUsageStats=false
    ports:
      - "${PANEL_PORT:-8501}:8501"
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs


volumes:
  pg_data:
  redis_data:


# ─── Quick reference ──────────────────────────────────────────────────────────
# Backend  : http://localhost:8000
# API docs : http://localhost:8000/docs
# Panel    : http://localhost:8501
# Default admin credentials: admin / admin1234
# Change immediately after first login!
